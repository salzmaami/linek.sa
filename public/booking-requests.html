<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Linek | طلبات الحجز</title><link rel="stylesheet" href="app.css"></head>
<body>
  <main class="app-shell">
    <header class="topbar"><a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a><nav><a href="dashboard.html">الملخص</a><a class="active" href="booking-requests.html">طلبات الحجز</a></nav><button class="button secondary" data-logout type="button">خروج</button></header>
    <section class="dashboard-grid"><aside class="sidebar" id="sidebar"></aside><div class="stack">
      <section class="panel"><div class="panel-head"><div><span class="eyebrow">طلبات الحجز</span><h1>قبول أو رفض الطلبات</h1></div><button class="button soft" id="expireNow" type="button">تحديث المنتهية</button></div><div class="actions"><select id="statusFilter"><option value="">كل الحالات</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="rejected">Rejected</option><option value="expired">Expired</option><option value="cancelled">Cancelled</option></select><input id="searchBox" placeholder="بحث بالضيف أو الجوال أو المرجع"></div></section>
      <section class="panel"><div class="stack" id="bookingsList"><div class="empty">جار التحميل...</div></div></section>
    </div></section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="linek-config.js"></script><script src="linek-app.js"></script><script src="owner-tools.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = OwnerTools.sidebar('booking-requests.html');
    let bookings = [];
    const statusLabels = {
      pending: 'بانتظار موافقتك',
      confirmed: 'مؤكد',
      rejected: 'مرفوض',
      expired: 'منتهي',
      cancelled: 'ملغي',
      pending_payment: 'بانتظار الدفع'
    };
    function displayStatus(booking) {
      if (booking.status === 'confirmed' && booking.payment_status === 'paid_confirmed') return 'مؤكد نهائياً';
      return statusLabels[booking.status] || booking.status;
    }
    function statusBadgeClass(booking) {
      if (booking.status === 'pending') return 'warn';
      if (['rejected', 'cancelled', 'expired'].includes(booking.status)) return 'danger';
      return '';
    }
    function statusNotice(booking) {
      if (booking.status === 'pending') return `المتبقي لقبول الطلب: <b data-countdown="${booking.id}">${remaining(booking)}</b>`;
      if (booking.status === 'confirmed' && booking.payment_status === 'paid_confirmed') return 'تم تأكيد الحجز نهائياً وانعكس ذلك في صفحة الضيف.';
      if (booking.status === 'confirmed') return 'وافق المالك على الطلب. بقي تأكيد الحجز النهائي بعد إكمال الترتيب مع الضيف.';
      return `حالة الطلب: <b>${displayStatus(booking)}</b>`;
    }
    function actionButtons(booking) {
      if (booking.status === 'pending') {
        return `<button class="button" data-action="accept" data-id="${booking.id}">قبول الطلب</button><button class="button danger" data-action="reject" data-id="${booking.id}">رفض الطلب</button>`;
      }
      if (booking.status === 'confirmed' && booking.payment_status !== 'paid_confirmed') {
        return `<button class="button" data-action="finalize" data-id="${booking.id}">تأكيد الحجز النهائي</button>`;
      }
      if (booking.status === 'confirmed' && booking.payment_status === 'paid_confirmed') {
        return '<button class="button secondary" type="button" disabled>تم تأكيد الحجز</button>';
      }
      return '<button class="button secondary" type="button" disabled>لا يوجد إجراء متاح</button>';
    }
    function nights(booking) {
      if (!booking.check_in || !booking.check_out) return 0;
      return Math.max(1, Math.round((new Date(booking.check_out) - new Date(booking.check_in)) / 86400000));
    }
    function iso(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    function addDays(value, amount) {
      const date = new Date(`${value}T00:00:00`);
      date.setDate(date.getDate() + amount);
      return iso(date);
    }
    function remaining(booking) {
      if (booking.status !== 'pending') return booking.status;
      const ms = new Date(booking.expires_at).getTime() - Date.now();
      if (ms <= 0) return '00:00';
      const total = Math.floor(ms / 1000);
      return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    }
    async function load() {
      const context = await OwnerTools.guard();
      if (!context) return;
      bookings = await OwnerTools.bookings(context.profile.id);
      render();
    }
    function render() {
      const status = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchBox').value.trim().toLowerCase();
      const list = bookings.filter(booking => (!status || booking.status === status) && (!search || `${booking.guest_name} ${booking.guest_mobile || booking.guest_phone} ${booking.reference || booking.public_code}`.toLowerCase().includes(search)));
      document.getElementById('bookingsList').innerHTML = list.map(booking => {
        const badgeClass = statusBadgeClass(booking);
        const amount = OwnerTools.money(booking.total_price || booking.amount);
        const stayNights = nights(booking);
        return `<details class="booking-ticket ${booking.status === 'pending' ? 'is-pending' : ''}">
          <summary>
            <div>
              <b>${OwnerTools.escapeHtml(booking.guest_name)}</b>
              <small>${OwnerTools.escapeHtml(booking.reference || booking.public_code)} · ${OwnerTools.escapeHtml(booking.properties?.title || booking.properties?.name || '')}</small>
            </div>
            <span class="badge ${badgeClass}">${OwnerTools.escapeHtml(displayStatus(booking))}</span>
          </summary>
          <div class="ticket-body">
            <div class="ticket-grid">
              <div><span>الضيف</span><b>${OwnerTools.escapeHtml(booking.guest_name)}</b></div>
              <div><span>الجوال</span><b>${OwnerTools.escapeHtml(booking.guest_mobile || booking.guest_phone || '-')}</b></div>
              <div><span>العقار</span><b>${OwnerTools.escapeHtml(booking.properties?.title || booking.properties?.name || '-')}</b></div>
              <div><span>رقم الطلب</span><b dir="ltr">${OwnerTools.escapeHtml(booking.reference || booking.public_code || '-')}</b></div>
              <div><span>الدخول</span><b>${OwnerTools.dateText(booking.check_in)}</b></div>
              <div><span>الخروج</span><b>${OwnerTools.dateText(booking.check_out)}</b></div>
              <div><span>عدد الليالي</span><b>${stayNights} ${stayNights === 1 ? 'ليلة' : 'ليالي'}</b></div>
              <div><span>المبلغ</span><b>${amount}</b></div>
            </div>
            <div class="notice ${booking.status === 'pending' ? 'warn' : booking.payment_status === 'paid_confirmed' ? 'success' : ''}">${statusNotice(booking)}</div>
            ${booking.notes ? `<div class="notice">ملاحظات الضيف: ${OwnerTools.escapeHtml(booking.notes)}</div>` : ''}
            <div class="actions">${actionButtons(booking)}</div>
          </div>
        </details>`;
      }).join('') || '<div class="empty">لا توجد طلبات بهذه الحالة.</div>';
    }
    async function setAvailabilityDay(propertyId, date, status) {
      const existing = await Linek.db(`availability?select=id&property_id=eq.${encodeURIComponent(propertyId)}&date=eq.${date}&limit=1`);
      const body = {property_id: propertyId, date, status};
      if (existing.length) await Linek.db(`availability?id=eq.${existing[0].id}`, {method: 'PATCH', body});
      else await Linek.db('availability', {method: 'POST', body});
    }
    async function reserveBookingDates(booking) {
      if (!booking.property_id || !booking.check_in || !booking.check_out) return;
      for (let value = booking.check_in; value < booking.check_out; value = addDays(value, 1)) {
        await setAvailabilityDay(booking.property_id, value, 'reserved');
      }
    }
    async function updateBooking(id, status) {
      const booking = bookings.find(item => item.id === id);
      if (!booking || booking.status !== 'pending') return;
      if (new Date(booking.expires_at).getTime() <= Date.now()) throw new Error('انتهت مهلة هذا الطلب');
      await Linek.db(`bookings?id=eq.${encodeURIComponent(id)}&owner_profile_id=eq.${encodeURIComponent(booking.owner_profile_id)}`, {method: 'PATCH', body: {status, payment_status: status === 'confirmed' ? 'waiting_for_payment' : 'cancelled', decided_at: new Date().toISOString()}});
      if (status === 'confirmed') await reserveBookingDates(booking);
      await Linek.db('booking_events', {method: 'POST', body: {booking_id: id, event_type: status === 'confirmed' ? 'Owner Accepted' : 'Owner Rejected', notes: status === 'confirmed' ? 'وافق المالك على الطلب.' : 'رفض المالك الطلب.'}});
    }
    async function finalizeBooking(id) {
      const booking = bookings.find(item => item.id === id);
      if (!booking || booking.status !== 'confirmed') return;
      await Linek.db(`bookings?id=eq.${encodeURIComponent(id)}&owner_profile_id=eq.${encodeURIComponent(booking.owner_profile_id)}`, {method: 'PATCH', body: {payment_status: 'paid_confirmed', decided_at: booking.decided_at || new Date().toISOString()}});
      await Linek.db('booking_events', {method: 'POST', body: {booking_id: id, event_type: 'Owner Accepted', notes: 'تم تأكيد الحجز نهائياً من المالك.'}});
    }
    document.body.addEventListener('click', async event => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      Linek.setLoading(button, true);
      try {
        if (button.dataset.action === 'finalize') await finalizeBooking(button.dataset.id);
        else await updateBooking(button.dataset.id, button.dataset.action === 'accept' ? 'confirmed' : 'rejected');
        Linek.toast('تم تحديث الطلب');
        await load();
      } catch (error) { Linek.toast(error.message); } finally { Linek.setLoading(button, false); }
    });
    document.getElementById('expireNow').addEventListener('click', async event => {
      Linek.setLoading(event.currentTarget, true);
      try {
        const response = await fetch('/api/expire-bookings', {method: 'POST'});
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'تعذر تحديث المنتهية');
        Linek.toast(`تم تحديث ${data.expired || 0} طلب`);
        await load();
      } catch (error) { Linek.toast(error.message); } finally { Linek.setLoading(event.currentTarget, false); }
    });
    document.getElementById('statusFilter').addEventListener('change', render);
    document.getElementById('searchBox').addEventListener('input', render);
    setInterval(() => document.querySelectorAll('[data-countdown]').forEach(el => { const booking = bookings.find(item => item.id === el.dataset.countdown); if (booking) el.textContent = remaining(booking); }), 1000);
    load();
  </script>
</body>
</html>
