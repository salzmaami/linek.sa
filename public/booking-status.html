<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linek | حالة الحجز</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar"><a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a><nav><a href="index.html">الرئيسية</a><a class="active" href="booking-status.html">حالة الحجز</a></nav></header>
    <section class="hero-panel">
      <div>
        <span class="eyebrow">حالة الطلب</span>
        <h1 id="statusTitle">جار تحميل الطلب</h1>
        <p id="statusMessage">نراجع حالة طلبك الآن.</p>
        <div class="countdown-card notice warn"><b id="timer">--:--</b><br><small>الوقت المتبقي لموافقة المالك</small></div>
        <div class="actions" id="guestActions"></div>
      </div>
      <div class="panel">
        <div class="status-steps" id="steps"><span data-step="submitted">إرسال الطلب</span><span data-step="pending">بانتظار المالك</span><span data-step="confirmed">مؤكد</span><span data-step="final">نهائي</span></div>
        <div class="stack" id="bookingSummary"></div>
      </div>
    </section>
    <section class="panel"><div class="panel-head"><h2>سجل الطلب</h2></div><div class="stack" id="eventsList"></div></section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    const params = new URLSearchParams(location.search);
    let booking = null;
    function money(value) { return `${Number(value || 0).toLocaleString('ar-SA')} ر.س`; }
    function dateText(value) { return value ? new Intl.DateTimeFormat('ar-SA', {dateStyle: 'medium'}).format(new Date(value)) : '-'; }
    function statusCopy(status) {
      return {
        pending: ['طلبك بانتظار موافقة المالك', 'يبقى الطلب محجوزاً مؤقتاً لمدة 30 دقيقة.'],
        confirmed: ['تم تأكيد حجزك', 'وافق المالك على الطلب. اتبع تعليمات الدفع الخاصة بالمالك.'],
        rejected: ['تم رفض طلب الحجز', 'يمكنك اختيار موعد آخر أو التواصل مع المالك.'],
        expired: ['انتهت مهلة الطلب', 'يمكنك إرسال طلب حجز جديد بتواريخ متاحة.'],
        cancelled: ['تم إلغاء الحجز', 'هذا الطلب لم يعد نشطاً.']
      }[status] || ['حالة الطلب', status];
    }
    function renderTimer() {
      if (!booking || booking.status !== 'pending') {
        document.getElementById('timer').textContent = booking?.status === 'confirmed' ? 'مقبول' : '00:00';
        return;
      }
      const remaining = new Date(booking.expires_at).getTime() - Date.now();
      if (remaining <= 0) {
        document.getElementById('timer').textContent = '00:00';
        load();
        return;
      }
      const total = Math.floor(remaining / 1000);
      document.getElementById('timer').textContent = `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    }
    function render(data) {
      booking = data.booking;
      const copy = statusCopy(booking.status);
      document.getElementById('statusTitle').textContent = copy[0];
      document.getElementById('statusMessage').textContent = copy[1];
      document.querySelectorAll('#steps span').forEach(step => {
        const key = step.dataset.step;
        step.classList.toggle('active', key === 'submitted' || key === booking.status || (key === 'pending' && booking.status === 'pending') || (key === 'final' && ['rejected', 'expired', 'cancelled'].includes(booking.status)));
      });
      const payment = booking.payment_link_snapshot
        ? `<a class="button" href="${booking.payment_link_snapshot}" target="_blank" rel="noopener">فتح رابط دفع المالك</a>`
        : '<span class="notice">لا يوجد رابط دفع. اتبع تعليمات المالك عند التواصل.</span>';
      document.getElementById('guestActions').innerHTML = booking.status === 'confirmed' || booking.status === 'pending' ? payment : '<a class="button" href="stay.html">اختيار تاريخ جديد</a>';
      document.getElementById('bookingSummary').innerHTML = [
        ['رقم الطلب', booking.reference || booking.public_code],
        ['العقار', booking.properties?.title || booking.properties?.name || '-'],
        ['التواريخ', `${dateText(booking.check_in)} إلى ${dateText(booking.check_out)}`],
        ['الضيوف', booking.guests_count],
        ['المبلغ التقديري', money(booking.total_price || booking.amount)],
        ['تعليمات الدفع', booking.payment_instructions_snapshot || 'تظهر حسب وسيلة دفع المالك']
      ].map(([label, value]) => `<div class="card"><small>${label}</small><br><b>${value}</b></div>`).join('');
      document.getElementById('eventsList').innerHTML = data.events.map(event => `<div class="card"><b>${event.event_type}</b><small>${dateText(event.created_at)} · ${event.notes || ''}</small></div>`).join('') || '<div class="empty">لا توجد أحداث بعد.</div>';
      renderTimer();
    }
    async function load() {
      const ref = params.get('ref');
      const token = params.get('token');
      const response = await fetch(`/api/booking-status?ref=${encodeURIComponent(ref || '')}&token=${encodeURIComponent(token || '')}`);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'تعذر تحميل الطلب');
      render(data);
    }
    load().catch(error => { document.getElementById('statusTitle').textContent = 'تعذر تحميل الطلب'; document.getElementById('statusMessage').textContent = error.message; });
    setInterval(renderTimer, 1000);
  </script>
</body>
</html>
