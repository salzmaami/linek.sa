<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linek | لوحة المالك</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar"><a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a><nav><a class="active" href="dashboard.html">لوحة المالك</a><a href="properties.html">العقارات</a><a href="booking-requests.html">الحجوزات</a></nav><button class="button secondary" data-logout type="button">خروج</button></header>
    <section class="dashboard-grid">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="stack">
        <section class="panel">
          <div class="panel-head"><div><span class="eyebrow">ملخص التشغيل</span><h1>لوحة المالك</h1><p id="welcomeLine">جار التحميل...</p></div><a class="button" href="properties.html">إضافة عقار</a></div>
          <div class="owner-metrics" id="metrics"></div>
        </section>
        <section class="grid-2">
          <article class="panel"><div class="panel-head"><h2>طلبات حديثة</h2><a href="booking-requests.html">عرض الكل</a></div><div class="stack" id="recentBookings"></div></article>
          <article class="panel"><div class="panel-head"><h2>إجراءات سريعة</h2></div><div class="stack"><a class="button secondary" href="calendar.html">فتح التقويم</a><a class="button secondary" href="payment-settings.html">إعدادات الدفع</a><a class="button secondary" href="calendar-sync.html">مزامنة التقويم مع التطبيقات الثانية</a><button class="button soft" id="copyFirstLink" type="button">نسخ أول رابط حجز</button></div></article>
        </section>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="linek-config.js"></script><script src="linek-app.js"></script><script src="owner-tools.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = OwnerTools.sidebar('dashboard.html');
    document.addEventListener('DOMContentLoaded', async () => {
      const context = await OwnerTools.guard();
      if (!context) return;
      document.getElementById('welcomeLine').textContent = `مرحباً ${context.profile.full_name}. هذه أرقام آخر 30 يوم.`;
      const properties = await OwnerTools.properties(context.profile.id);
      const [bookings, visits] = await Promise.all([
        OwnerTools.bookings(context.profile.id),
        OwnerTools.pageVisits(properties)
      ]);
      const since = Date.now() - (30 * 24 * 60 * 60 * 1000);
      const recentBookings = bookings.filter(item => !item.created_at || new Date(item.created_at).getTime() >= since);
      const recentVisits = visits.filter(item => !item.visited_at || new Date(item.visited_at).getTime() >= since);
      const pending = bookings.filter(item => item.status === 'pending');
      const confirmed = recentBookings.filter(item => item.status === 'confirmed');
      const revenue = confirmed.reduce((sum, item) => sum + Number(item.total_price || item.amount || 0), 0);
      const conversion = recentVisits.length ? Math.round((recentBookings.length / recentVisits.length) * 100) : 0;
      const propertyLimit = OwnerTools.propertyLimit(context.profile);
      const metricCards = [
        {label: 'العقارات', hint: 'المستخدم من حد الباقة', value: `${properties.length}/${propertyLimit}`, progress: propertyLimit ? (properties.length / propertyLimit) * 100 : 0, color: '#6d3df4', href: 'properties.html'},
        {label: 'طلبات بانتظارك', hint: 'طلبات تحتاج قبول أو رفض', value: pending.length, progress: pending.length ? 100 : 0, color: '#b36a13', href: 'booking-requests.html'},
        {label: 'حجوزات مؤكدة', hint: 'حجوزات تم قبولها', value: confirmed.length, progress: confirmed.length ? 100 : 0, color: '#1f8a5b', href: 'booking-requests.html'},
        {label: 'زيارات الصفحات', hint: 'زيارات صفحة الحجز', value: recentVisits.length, progress: recentVisits.length ? 100 : 0, color: '#2584e8', href: 'properties.html'},
        {label: 'تحويل الطلبات من الزيارات', hint: 'طلبات الحجز ÷ زيارات صفحة الحجز', value: `${conversion}%`, progress: conversion, color: '#7a42f4', href: 'booking-requests.html'},
        {label: 'إيراد تقديري', hint: 'مجموع الحجوزات المؤكدة', value: OwnerTools.money(revenue), progress: revenue ? 100 : 0, color: '#111827', href: 'booking-requests.html'}
      ];
      document.getElementById('metrics').innerHTML = metricCards.map(item => {
        const progress = Math.max(0, Math.min(100, Math.round(Number(item.progress || 0))));
        return `<a class="donut-metric" href="${item.href}" style="--metric-color:${item.color};--metric-progress:${progress}%"><div class="metric-ring"><b>${item.value}</b></div><span>${item.label}</span><small>${item.hint}</small></a>`;
      }).join('');
      document.getElementById('recentBookings').innerHTML = bookings.slice(0, 5).map(booking => `<div class="card"><b>${OwnerTools.escapeHtml(booking.guest_name)}</b><small>${OwnerTools.escapeHtml(booking.properties?.title || booking.properties?.name || '')} · ${OwnerTools.dateText(booking.check_in)} · ${OwnerTools.money(booking.total_price || booking.amount)}</small><span class="badge ${booking.status === 'pending' ? 'warn' : ''}">${OwnerTools.escapeHtml(booking.status)}</span></div>`).join('') || '<div class="empty">لا توجد طلبات حجز بعد.</div>';
      document.getElementById('copyFirstLink').addEventListener('click', async () => {
        if (!properties.length) return Linek.toast('أضف عقاراً أولاً');
        await navigator.clipboard.writeText(OwnerTools.publicLink(properties[0]));
        Linek.toast('تم نسخ رابط الحجز');
      });
    });
  </script>
</body>
</html>
