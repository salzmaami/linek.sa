<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linek | استعادة كلمة المرور</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar"><a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a><nav><a href="login.html">دخول</a></nav></header>
    <section class="hero-panel">
      <div><span class="eyebrow">استعادة الدخول</span><h1>أرسل رابط إعادة التعيين</h1><p>اكتب بريد حسابك وسنرسل رابط استعادة كلمة المرور عبر Supabase Auth.</p></div>
      <form class="panel form-grid" id="forgotForm">
        <label class="field full"><span>البريد الإلكتروني</span><input name="email" type="email" required></label>
        <div class="actions field full"><button class="button" type="submit">إرسال الرابط</button><a class="button secondary" href="login.html">رجوع</a></div>
        <div class="notice field full" id="forgotStatus" hidden></div>
      </form>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="linek-config.js"></script>
  <script src="linek-app.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async event => {
      event.preventDefault();
      const form = event.currentTarget;
      const button = form.querySelector('button');
      Linek.setLoading(button, true);
      try {
        await Linek.resetPassword(new FormData(form).get('email'));
        const status = document.getElementById('forgotStatus');
        status.hidden = false;
        status.className = 'notice success field full';
        status.textContent = 'إذا كان البريد مسجلًا، سيصل رابط إعادة التعيين.';
      } catch (error) {
        Linek.toast(error.message);
      } finally {
        Linek.setLoading(button, false);
      }
    });
  </script>
</body>
</html>
