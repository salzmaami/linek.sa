<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linek | دخول المالك</title>
  <link rel="icon" href="assets/linek-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a>
      <nav><a href="index.html">الرئيسية</a><a href="register.html">تسجيل</a><a class="active" href="login.html">دخول</a></nav>
    </header>
    <section class="hero-panel">
      <div>
        <span class="eyebrow">دخول المالك</span>
        <h1>ادخل لإدارة حجوزاتك</h1>
        <p>إذا كان حسابك تحت المراجعة ستظهر لك صفحة الانتظار بدل لوحة التحكم.</p>
      </div>
      <form class="panel form-grid" id="loginForm">
        <label class="field full"><span>البريد الإلكتروني</span><input name="identifier" type="email" required autocomplete="email"></label>
        <label class="field full"><span>كلمة المرور</span><input name="password" type="password" required autocomplete="current-password"></label>
        <label class="checkline field full"><input name="remember" type="checkbox"><span>تذكرني على هذا الجهاز</span></label>
        <div class="actions field full"><button class="button" type="submit">دخول</button><a class="button secondary" href="register.html">تسجيل</a><a class="button soft" href="forgot-password.html">نسيت كلمة المرور</a></div>
      </form>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="linek-config.js"></script>
  <script src="linek-app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      const form = event.currentTarget;
      const data = Linek.formData(form);
      const button = form.querySelector('button[type="submit"]');
      Linek.setLoading(button, true);
      try {
        await Linek.signIn(data.identifier, data.password);
        const profile = await Linek.ensureOwnerProfile();
        if (!profile || profile.verification_status === 'pending') window.location.href = 'waiting-approval.html';
        else if (profile.verification_status === 'approved') window.location.href = 'dashboard.html';
        else window.location.href = 'verification-status.html';
      } catch (error) {
        Linek.toast(error.message);
      } finally {
        Linek.setLoading(button, false);
      }
    });
  </script>
</body>
</html>
