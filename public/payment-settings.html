<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Linek | إعدادات الدفع</title><link rel="stylesheet" href="app.css"></head>
<body>
  <main class="app-shell">
    <header class="topbar"><a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a><nav><a href="dashboard.html">الملخص</a><a class="active" href="payment-settings.html">الدفع</a></nav><button class="button secondary" data-logout type="button">خروج</button></header>
    <section class="dashboard-grid"><aside class="sidebar" id="sidebar"></aside><div class="stack">
      <section class="panel"><span class="eyebrow">إعدادات الدفع</span><h1>وسيلة استلام مدفوعات الحجوزات</h1><p>Linek لا يستلم مبالغ حجوزات الضيوف. هذه البيانات تظهر للضيف بعد إرسال طلب الحجز وتُحفظ نسخة منها داخل كل طلب.</p></section>
      <section class="panel">
        <form class="form-grid" id="paymentForm">
          <input type="hidden" name="id">
          <label class="field"><span>طريقة الدفع</span><select name="payment_provider"><option value="payment_link">رابط دفع</option><option value="bank_transfer">تحويل بنكي</option></select></label>
          <label class="field"><span>رابط الدفع</span><input name="payment_url" type="url" dir="ltr"></label>
          <label class="field"><span>IBAN</span><input name="iban" dir="ltr" maxlength="34"></label>
          <label class="field"><span>اسم الحساب</span><input name="account_name"></label>
          <label class="field full"><span>تعليمات تظهر للضيف</span><textarea name="instructions"></textarea></label>
          <div class="actions field full"><button class="button" type="submit">حفظ إعدادات الدفع</button></div>
        </form>
      </section>
      <section class="panel"><h2>معاينة شاشة الضيف</h2><div class="notice" id="paymentPreview">أدخل وسيلة الدفع لمعاينتها.</div></section>
    </div></section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="linek-config.js"></script><script src="linek-app.js"></script><script src="owner-tools.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = OwnerTools.sidebar('payment-settings.html');
    const form = document.getElementById('paymentForm');
    let context = null;
    function renderPreview() {
      const data = Linek.formData(form);
      document.getElementById('paymentPreview').innerHTML = `<b>${data.payment_provider === 'bank_transfer' ? 'تحويل بنكي' : 'رابط دفع'}</b><br>${OwnerTools.escapeHtml(data.payment_url || data.iban || 'لم تضف البيانات بعد')}<br><small>${OwnerTools.escapeHtml(data.instructions || 'لا توجد تعليمات')}</small>`;
    }
    form.addEventListener('input', renderPreview);
    document.addEventListener('DOMContentLoaded', async () => {
      context = await OwnerTools.guard();
      if (!context) return;
      const rows = await Linek.db(`owner_payment_methods?select=*&owner_id=eq.${encodeURIComponent(context.profile.id)}&active=eq.true&limit=1`);
      const method = rows[0];
      if (method) Object.entries(method).forEach(([key, value]) => { if (form.elements[key]) form.elements[key].value = value ?? ''; });
      renderPreview();
    });
    form.addEventListener('submit', async event => {
      event.preventDefault();
      const button = event.submitter;
      const data = Linek.formData(form);
      const body = {owner_id: context.profile.id, payment_provider: data.payment_provider, payment_url: data.payment_url || null, iban: data.iban || null, account_name: data.account_name || null, instructions: data.instructions || null, active: true};
      Linek.setLoading(button, true);
      try {
        if (data.id) await Linek.db(`owner_payment_methods?id=eq.${encodeURIComponent(data.id)}`, {method: 'PATCH', body});
        else {
          const rows = await Linek.db('owner_payment_methods', {method: 'POST', body});
          form.elements.id.value = rows[0].id;
        }
        await Linek.db('audit_logs', {method: 'POST', body: {user_id: context.user.id, action: 'Payment Link Updated', metadata: {provider: body.payment_provider}}});
        Linek.toast('تم تحديث إعدادات الدفع');
      } catch (error) {
        Linek.toast(error.message);
      } finally {
        Linek.setLoading(button, false);
      }
    });
  </script>
</body>
</html>
