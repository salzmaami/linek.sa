<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linek | تسجيل المالك</title>
  <link rel="icon" href="assets/linek-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a>
      <nav><a href="index.html">الرئيسية</a><a class="active" href="register.html">تسجيل</a><a href="login.html">دخول</a></nav>
    </header>
    <section class="hero-panel">
      <div>
        <span class="eyebrow">حساب مالك</span>
        <h1>ابدأ بصفحة حجز موثقة</h1>
        <p>أنشئ حسابك ثم ارفع مستندات التوثيق المطلوبة. لوحة المالك لا تفتح إلا بعد موافقة Linek.</p>
      </div>
      <form class="panel form-grid" id="registerForm">
        <label class="field"><span>الاسم الكامل</span><input name="full_name" required minlength="2" autocomplete="name"></label>
        <label class="field"><span>اسم النشاط اختياري</span><input name="business_name" autocomplete="organization"></label>
        <label class="field"><span>البريد الإلكتروني</span><input name="email" type="email" required autocomplete="email"></label>
        <label class="field"><span>الجوال</span><input name="mobile" required inputmode="tel" pattern="^05[0-9]{8}$" placeholder="05xxxxxxxx"></label>
        <label class="field"><span>الباقة</span><select name="requested_plan" required><option value="single">الأساسية - عقار واحد</option><option value="multi">النمو - حتى 5 عقارات</option></select></label>
        <label class="field"><span>المدينة</span><input name="city" required minlength="2"></label>
        <label class="field"><span>كلمة المرور</span><input name="password" type="password" required minlength="8" autocomplete="new-password"></label>
        <label class="field"><span>تأكيد كلمة المرور</span><input name="confirm_password" type="password" required minlength="8" autocomplete="new-password"></label>
        <label class="checkline field full"><input name="terms" type="checkbox" required><span>أوافق على الشروط، وأفهم أن Linek لا تستلم مبالغ حجوزات الضيوف في نموذج البداية.</span></label>
        <div class="actions field full"><button class="button" type="submit">إنشاء الحساب</button><a class="button secondary" href="login.html">لدي حساب</a></div>
        <div class="notice field full" id="registerStatus" hidden></div>
      </form>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="linek-config.js"></script>
  <script src="linek-app.js"></script>
  <script>
    const initialPlan = new URLSearchParams(location.search).get('plan');
    if (['single', 'multi'].includes(initialPlan)) {
      document.querySelector('[name="requested_plan"]').value = initialPlan;
    }
    document.getElementById('registerForm').addEventListener('submit', async event => {
      event.preventDefault();
      const form = event.currentTarget;
      if (!form.checkValidity()) return form.reportValidity();
      const data = Linek.formData(form);
      if (data.password !== data.confirm_password) return Linek.toast('كلمة المرور غير متطابقة');
      const button = form.querySelector('button[type="submit"]');
      Linek.setLoading(button, true);
      try {
        const result = await Linek.signUp(data);
        const status = document.getElementById('registerStatus');
        status.hidden = false;
        status.className = 'notice success field full';
        status.textContent = result.access_token ? 'تم إنشاء الحساب. سيتم نقلك لرفع التوثيق.' : 'تم إنشاء الحساب. تحقق من بريدك إذا كان تأكيد البريد مفعلًا.';
        if (result.access_token) setTimeout(() => { window.location.href = 'verification-upload.html'; }, 700);
      } catch (error) {
        Linek.toast(error.message);
      } finally {
        Linek.setLoading(button, false);
      }
    });
  </script>
</body>
</html>
