<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linek | طلبك قيد المراجعة</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar"><a class="brand" href="index.html"><img src="assets/linek-mark.svg" alt=""><span>لاينك</span></a><nav><a class="active" href="waiting-approval.html">انتظار الموافقة</a><a href="verification-status.html">حالة التوثيق</a></nav><button class="button secondary" data-logout type="button">خروج</button></header>
    <section class="hero-panel">
      <div>
        <span class="eyebrow">مراجعة Linek</span>
        <h1>طلبك قيد المراجعة</h1>
        <p>سنراجع بياناتك ونرسل لك رسالة واتساب بمجرد اعتماد حسابك. لوحة المالك والعقارات والحجوزات والدفع تبقى مغلقة حتى الاعتماد.</p>
        <div class="actions"><a class="button secondary" href="verification-upload.html">رفع أو تحديث الوثائق</a><a class="button soft" href="https://wa.me/966570547475" target="_blank" rel="noopener">تواصل مع الدعم</a></div>
      </div>
      <div class="panel">
        <div class="status-steps"><span class="active">إنشاء الحساب</span><span class="active">رفع التوثيق</span><span class="active">مراجعة Linek</span><span>فتح اللوحة</span></div>
        <div class="notice warn" id="approvalState">جار تحميل حالة الطلب...</div>
      </div>
    </section>
  </main>
  <script src="linek-config.js"></script>
  <script src="linek-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await Linek.requireOwner();
      if (!user) return;
      const profile = await Linek.ensureOwnerProfile();
      const state = document.getElementById('approvalState');
      if (profile?.verification_status === 'approved') {
        state.className = 'notice success';
        state.textContent = 'تم اعتماد حسابك. يمكنك فتح لوحة المالك الآن.';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } else if (profile?.verification_status === 'rejected' || profile?.verification_status === 'more_information_required') {
        window.location.href = 'verification-status.html';
      } else {
        const request = await Linek.latestVerificationRequest(profile.id);
        if (!request) {
          window.location.href = 'verification-upload.html';
          return;
        }
        state.textContent = 'وثائقك وصلت. حسابك بانتظار مراجعة فريق Linek.';
      }
    });
  </script>
</body>
</html>
